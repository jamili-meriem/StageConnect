name: CI/CD StageConnect

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo_mysql, mbstring, xml, curl

    - name: Install dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Copy .env
      run: cp .env.example .env

    - name: Generate key
      run: php artisan key:generate

    - name: Check syntax
      run: find app -name "*.php" -exec php -l {} \;

    - name: Build assets
      run: |
        npm install
        npm run build